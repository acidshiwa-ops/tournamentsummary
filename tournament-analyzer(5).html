<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GGPoker Tournament Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --bg: #080810; --panel: #0f0f1a; --panel2: #161626;
  --border: #1e1e35; --border2: #2a2a45;
  --gold: #f5c842; --gold2: #e6a800;
  --green: #22d97a; --red: #f04060;
  --blue: #4f8eff; --purple: #a855f7;
  --text: #e2e2f0; --muted: #5a5a80; --muted2: #3a3a58;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; }
body::after { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events:none; z-index:9999; opacity:0.4; }
.app { max-width:1280px; margin:0 auto; padding:0 24px 60px; }

/* HEADER */
.header { display:flex; align-items:center; justify-content:space-between; padding:24px 0 20px; border-bottom:1px solid var(--border); margin-bottom:24px; }
.brand { display:flex; align-items:baseline; gap:12px; }
.brand-title { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:3px; color:var(--gold); line-height:1; }
.brand-sub { font-size:11px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; }
.header-right { display:flex; align-items:center; gap:12px; }
.pill { background:var(--panel2); border:1px solid var(--border2); border-radius:100px; padding:6px 14px; font-size:11px; color:var(--muted); font-family:'Space Mono',monospace; letter-spacing:1px; transition:all 0.2s; }
.pill.active { border-color:var(--gold); color:var(--gold); background:rgba(245,200,66,0.08); }
.clear-btn { background:transparent; border:1px solid var(--border2); color:var(--muted); padding:6px 14px; border-radius:100px; font-size:11px; font-family:'Space Mono',monospace; cursor:pointer; transition:all 0.2s; }
.clear-btn:hover { border-color:var(--red); color:var(--red); background:rgba(240,64,96,0.08); }

/* DB BAR */
.db-bar { display:none; align-items:center; gap:8px; background:rgba(245,200,66,0.06); border:1px solid rgba(245,200,66,0.2); border-radius:8px; padding:10px 16px; font-size:11px; color:var(--gold); margin-bottom:16px; font-family:'Space Mono',monospace; }
.db-bar.show { display:flex; animation:fadeUp 0.3s ease; }

/* TOAST */
.toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--panel2); border:1px solid var(--border2); border-radius:100px; padding:10px 22px; font-size:12px; font-family:'Space Mono',monospace; color:var(--text); opacity:0; pointer-events:none; transition:all 0.3s ease; white-space:nowrap; z-index:10000; box-shadow:0 8px 32px rgba(0,0,0,0.4); }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.green { border-color:rgba(34,217,122,0.4); color:var(--green); }
.toast.red { border-color:rgba(240,64,96,0.4); color:var(--red); }
.toast.gold { border-color:rgba(245,200,66,0.4); color:var(--gold); }

/* DROP ZONE */
.drop-zone { border:1px dashed var(--border2); border-radius:12px; background:var(--panel); padding:40px; text-align:center; cursor:pointer; transition:all 0.25s; position:relative; overflow:hidden; margin-bottom:24px; }
.drop-zone::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 0%, rgba(245,200,66,0.06) 0%, transparent 70%); opacity:0; transition:opacity 0.3s; }
.drop-zone:hover,.drop-zone.over { border-color:var(--gold); background:rgba(245,200,66,0.03); }
.drop-zone:hover::before,.drop-zone.over::before { opacity:1; }
.drop-icon { font-size:32px; margin-bottom:12px; display:block; }
.drop-zone h2 { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:3px; color:var(--text); margin-bottom:6px; }
.drop-zone p { font-size:10px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }
#zipInput { display:none; }

/* PROGRESS */
.progress-wrap { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:20px 24px; margin-bottom:24px; display:none; }
.progress-wrap.show { display:block; animation:fadeUp 0.3s ease; }
.progress-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; font-size:11px; }
.progress-label { color:var(--text); } .progress-count { color:var(--gold); font-family:'Space Mono',monospace; }
.bar-track { background:var(--border); border-radius:4px; height:4px; overflow:hidden; margin-bottom:12px; }
.bar-fill { height:100%; background:linear-gradient(90deg,var(--gold2),var(--gold)); border-radius:4px; width:0%; transition:width 0.2s ease; }
.progress-filename { font-size:10px; color:var(--muted); font-family:'Space Mono',monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ERROR */
.error-bar { background:rgba(240,64,96,0.1); border:1px solid rgba(240,64,96,0.3); border-radius:8px; padding:12px 16px; font-size:12px; color:var(--red); margin-bottom:20px; display:none; }
.error-bar.show { display:block; }

/* RESULTS */
#results { display:none; }
#results.show { display:block; animation:fadeUp 0.4s ease; }

/* FILTER BAR */
.filter-bar { display:flex; align-items:center; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.filter-label { font-size:10px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }
.filter-group { display:flex; gap:4px; flex-wrap:wrap; }
.fbtn { background:var(--panel); border:1px solid var(--border2); color:var(--muted); padding:5px 12px; border-radius:100px; font-size:11px; font-family:'Space Mono',monospace; cursor:pointer; transition:all 0.18s; }
.fbtn:hover { border-color:var(--gold); color:var(--gold); }
.fbtn.active { background:rgba(245,200,66,0.12); border-color:var(--gold); color:var(--gold); }
.filter-sep { width:1px; height:20px; background:var(--border2); flex-shrink:0; }
.date-inputs { display:flex; gap:6px; align-items:center; }
.date-inputs input { background:var(--panel); border:1px solid var(--border2); color:var(--text); padding:5px 10px; border-radius:6px; font-size:11px; font-family:'Space Mono',monospace; outline:none; }
.date-inputs input:focus { border-color:var(--gold); }
.date-inputs span { color:var(--muted); font-size:11px; }
.reset-btn { background:transparent; border:1px solid var(--border2); color:var(--muted); padding:5px 10px; border-radius:6px; font-size:10px; font-family:'Space Mono',monospace; cursor:pointer; transition:all 0.2s; }
.reset-btn:hover { border-color:var(--purple); color:var(--purple); }

/* KPI */
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-bottom:20px; }
.kpi { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:18px 18px 16px; position:relative; overflow:hidden; transition:border-color 0.2s; }
.kpi:hover { border-color:var(--border2); }
.kpi-accent { position:absolute; top:0; left:0; right:0; height:2px; }
.kpi-label { font-size:9px; color:var(--muted); letter-spacing:2.5px; text-transform:uppercase; margin-bottom:8px; font-weight:500; }
.kpi-val { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:1px; line-height:1; margin-bottom:4px; }
.kpi-sub { font-size:10px; color:var(--muted); }

/* SECTION TABS */
.section { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:20px 24px; margin-bottom:16px; }
.section-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
.section-title { font-size:10px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; font-weight:500; }
.tabs { display:flex; gap:4px; flex-wrap:wrap; }
.tab { background:transparent; border:1px solid var(--border2); color:var(--muted); padding:5px 12px; border-radius:100px; font-size:10px; font-family:'Space Mono',monospace; cursor:pointer; transition:all 0.18s; }
.tab:hover { border-color:var(--blue); color:var(--blue); }
.tab.active { background:rgba(79,142,255,0.12); border-color:var(--blue); color:var(--blue); }
.chart-wrap { position:relative; }

/* GRID LAYOUTS */
.grid-2-1 { display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-bottom:16px; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
.grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:16px; }

/* PLACE BARS */
.place-bars { display:flex; flex-direction:column; gap:8px; }
.place-row { display:flex; align-items:center; gap:10px; }
.place-badge { font-size:10px; color:var(--muted); width:28px; text-align:right; flex-shrink:0; font-family:'Space Mono',monospace; }
.place-bar-track { flex:1; background:var(--border); border-radius:3px; height:20px; overflow:hidden; }
.place-bar-fill { height:100%; border-radius:3px; display:flex; align-items:center; padding-left:8px; font-size:10px; font-weight:600; color:#000; min-width:28px; transition:width 0.8s cubic-bezier(.16,1,.3,1); }
.place-count { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); width:32px; flex-shrink:0; text-align:right; }

/* TABLE */
.table-card { background:var(--panel); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:16px; }
.table-header { display:flex; justify-content:space-between; align-items:center; padding:14px 20px; border-bottom:1px solid var(--border); }
.table-wrap { overflow-x:auto; max-height:380px; overflow-y:auto; }
table { width:100%; border-collapse:collapse; font-size:12px; }
thead th { padding:9px 16px; text-align:left; font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; background:var(--panel2); font-weight:400; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:2; }
tbody td { padding:8px 16px; border-bottom:1px solid rgba(30,30,53,0.6); }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover td { background:rgba(245,200,66,0.025); }
.place-chip { display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; border-radius:50%; font-size:10px; font-weight:700; font-family:'Space Mono',monospace; }
.chip-1 { background:rgba(245,200,66,0.2); color:var(--gold); border:1px solid rgba(245,200,66,0.4); }
.chip-2 { background:rgba(200,200,220,0.12); color:#c0c0d0; border:1px solid rgba(200,200,220,0.3); }
.chip-3 { background:rgba(176,110,60,0.15); color:#cd7f32; border:1px solid rgba(176,110,60,0.3); }
.chip-n { background:var(--panel2); color:var(--muted); border:1px solid var(--border2); }
.mono { font-family:'Space Mono',monospace; }

/* ROI HEATMAP */
.heatmap-wrap { overflow-x:auto; }
.heatmap-grid { display:grid; gap:4px; }
.hm-cell { border-radius:4px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:6px 4px; min-height:52px; font-size:9px; font-family:'Space Mono',monospace; cursor:default; transition:transform 0.15s; }
.hm-cell:hover { transform:scale(1.06); z-index:2; }
.hm-label { color:rgba(255,255,255,0.5); margin-bottom:2px; }
.hm-val { font-weight:700; font-size:11px; }

/* NO DATA */
.no-data { text-align:center; padding:40px; color:var(--muted); font-size:12px; }

@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }

@media(max-width:800px){
  .grid-2-1,.grid-2,.grid-3 { grid-template-columns:1fr; }
  .filter-bar { gap:8px; }
}

/* BONUS PANEL */
.bonus-panel { background:var(--panel); border:1px solid var(--border); border-radius:10px; margin-bottom:16px; overflow:hidden; }
.bonus-panel-head { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:1px solid var(--border); cursor:pointer; user-select:none; }
.bonus-panel-head:hover { background:rgba(255,255,255,0.02); }
.bonus-toggle-icon { color:var(--muted); font-size:12px; transition:transform 0.2s; }
.bonus-toggle-icon.open { transform:rotate(180deg); }
.bonus-body { display:none; padding:20px; }
.bonus-body.open { display:block; animation:fadeUp 0.2s ease; }

.bonus-form { display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap; margin-bottom:20px; }
.bonus-field { display:flex; flex-direction:column; gap:5px; }
.bonus-field label { font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }
.bonus-field input, .bonus-field select {
  background:var(--panel2); border:1px solid var(--border2); color:var(--text);
  padding:7px 12px; border-radius:6px; font-size:12px; font-family:'Space Mono',monospace;
  outline:none; transition:border-color 0.2s; min-width:130px;
}
.bonus-field input:focus, .bonus-field select:focus { border-color:var(--purple); }
.bonus-field select option { background:var(--panel2); }
.bonus-add-btn {
  background:rgba(168,85,247,0.15); border:1px solid rgba(168,85,247,0.4);
  color:var(--purple); padding:7px 18px; border-radius:6px; font-size:11px;
  font-family:'Space Mono',monospace; cursor:pointer; transition:all 0.2s; white-space:nowrap;
}
.bonus-add-btn:hover { background:rgba(168,85,247,0.25); border-color:var(--purple); }

.bonus-table-wrap { max-height:260px; overflow-y:auto; }
.bonus-table { width:100%; border-collapse:collapse; font-size:12px; }
.bonus-table th { padding:8px 12px; text-align:left; font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; background:var(--panel2); font-weight:400; border-bottom:1px solid var(--border); position:sticky; top:0; }
.bonus-table td { padding:8px 12px; border-bottom:1px solid rgba(30,30,53,0.5); }
.bonus-table tr:last-child td { border-bottom:none; }
.bonus-table tr:hover td { background:rgba(168,85,247,0.04); }
.bonus-del-btn { background:transparent; border:1px solid rgba(240,64,96,0.3); color:rgba(240,64,96,0.6); padding:2px 8px; border-radius:4px; font-size:10px; cursor:pointer; transition:all 0.2s; font-family:'Space Mono',monospace; }
.bonus-del-btn:hover { border-color:var(--red); color:var(--red); background:rgba(240,64,96,0.08); }
.type-lb { color:var(--gold); }
.type-rb { color:var(--purple); }
.type-other { color:var(--blue); }
.bonus-summary { display:flex; gap:20px; margin-bottom:16px; flex-wrap:wrap; }
.bonus-sum-item { font-size:11px; font-family:'Space Mono',monospace; }
.bonus-sum-label { color:var(--muted); margin-right:6px; }
.bonus-empty { text-align:center; padding:24px; color:var(--muted); font-size:12px; }

/* MAIN NAV TABS */
.main-nav { display:flex; gap:4px; margin-bottom:24px; border-bottom:1px solid var(--border); padding-bottom:0; }
.main-tab { background:transparent; border:none; border-bottom:2px solid transparent; color:var(--muted); padding:10px 20px; font-size:12px; font-family:'Space Mono',monospace; cursor:pointer; transition:all 0.2s; margin-bottom:-1px; letter-spacing:1px; }
.main-tab:hover { color:var(--text); }
.main-tab.active { color:var(--gold); border-bottom-color:var(--gold); }

/* HAND HISTORY SECTION */
.hh-drop { border:1px dashed var(--border2); border-radius:10px; background:var(--panel); padding:32px; text-align:center; cursor:pointer; transition:all 0.2s; margin-bottom:16px; }
.hh-drop:hover,.hh-drop.over { border-color:var(--blue); background:rgba(79,142,255,0.03); }
.hh-drop h3 { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; color:var(--text); margin-bottom:6px; }
.hh-drop p { font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
#hhZipInput { display:none; }

/* chipEV */
.ev-kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:16px; }

/* Hand matrix */
.matrix-wrap { overflow-x:auto; }
.hand-matrix { border-collapse:collapse; font-size:9px; font-family:'Space Mono',monospace; }
.hand-matrix td { width:36px; height:36px; text-align:center; vertical-align:middle; border:1px solid var(--bg); border-radius:3px; cursor:default; font-size:8px; font-weight:700; transition:transform 0.1s; position:relative; }
.hand-matrix td:hover { transform:scale(1.15); z-index:5; }
.hand-matrix .hm-header { background:transparent!important; color:var(--muted); font-weight:400; font-size:9px; border:none; }
.hand-matrix .hm-label-row { background:transparent!important; color:var(--muted); font-weight:400; font-size:9px; border:none; width:28px; }
.pos-tabs { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:12px; }
.pos-tab { background:var(--panel2); border:1px solid var(--border2); color:var(--muted); padding:4px 12px; border-radius:100px; font-size:10px; font-family:'Space Mono',monospace; cursor:pointer; transition:all 0.18s; }
.pos-tab:hover { border-color:var(--blue); color:var(--blue); }
.pos-tab.active { background:rgba(79,142,255,0.12); border-color:var(--blue); color:var(--blue); }
.hh-stat-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
.top-hands-table { width:100%; border-collapse:collapse; font-size:11px; }
.top-hands-table th { padding:7px 12px; font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; background:var(--panel2); font-weight:400; border-bottom:1px solid var(--border); }
.top-hands-table td { padding:7px 12px; border-bottom:1px solid rgba(30,30,53,0.5); font-family:'Space Mono',monospace; font-size:11px; }
.top-hands-table tr:last-child td { border-bottom:none; }
.top-hands-table tr:hover td { background:rgba(79,142,255,0.03); }

</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="header">
  <div class="brand">
    <div class="brand-title">TOURNAMENT STATS</div>
    <div class="brand-sub">GGPoker В· Spin&amp;Go</div>
  </div>
  <div class="header-right">
    <div class="pill" id="statusPill">Р—Р°РіСҖСғР·РәР°вҖҰ</div>
    <button class="clear-btn" id="clearBtn">рҹ—‘ РһСҮРёСҒСӮРёСӮСҢ</button>
  </div>
</div>

<div class="db-bar" id="dbBar">
  <span>рҹ’ҫ</span><span id="dbBarText"></span>
  <span style="color:var(--muted)">В· РҹРөСҖРөСӮР°СүРёСӮРө РҪРҫРІСӢР№ ZIP СҮСӮРҫРұСӢ РҙРҫРҝРҫР»РҪРёСӮСҢ</span>
</div>
<div class="toast" id="toast"></div>

<!-- DROP ZONE -->
<div class="drop-zone" id="dropZone">
  <input type="file" id="zipInput" accept=".zip">
  <span class="drop-icon">рҹҸҶ</span>
  <h2 id="dropTitle">Р—РҗР“Р РЈР—РҳРўР• ZIP РҗР РҘРҳР’</h2>
  <p>GGPoker В· Tournament results В· .zip В· Р”Р°РҪРҪСӢРө СҒРҫС…СҖР°РҪСҸСҺСӮСҒСҸ Р°РІСӮРҫРјР°СӮРёСҮРөСҒРәРё</p>
</div>

<!-- PROGRESS -->
<div class="progress-wrap" id="progressWrap">
  <div class="progress-top">
    <span class="progress-label">рҹ—ң РһРұСҖР°РұРҫСӮРәР° Р°СҖС…РёРІР°вҖҰ</span>
    <span class="progress-count" id="progressCount">0 / 0</span>
  </div>
  <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
  <div class="progress-filename" id="progressFile">вҖ”</div>
</div>

<div class="error-bar" id="errorBar"></div>

<!-- MAIN NAV -->
<div class="main-nav">
  <button class="main-tab active" data-page="tournaments">рҹҸҶ РўСғСҖРҪРёСҖСӢ</button>
  <button class="main-tab" data-page="hands">рҹғҸ Hand History</button>
</div>

<!-- PAGE: TOURNAMENTS -->
<div id="pageTournaments">
<!-- RESULTS -->
<div id="results">

  <!-- FILTERS -->
  <div class="filter-bar">
    <span class="filter-label">Buy-in</span>
    <div class="filter-group" id="buyinFilters"></div>
    <div class="filter-sep"></div>
    <span class="filter-label">РҹРөСҖРёРҫРҙ</span>
    <div class="date-inputs">
      <input type="date" id="dateFrom" title="РһСӮ">
      <span>вҶ’</span>
      <input type="date" id="dateTo" title="Р”Рҫ">
    </div>
    <button class="reset-btn" id="resetFilters">Г— РЎРұСҖРҫСҒРёСӮСҢ</button>
    <span id="filterCount" style="font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;margin-left:4px"></span>

const DB_NAME='ggpoker_stats', DB_VER=3, STORE='tournaments', BSTORE='bonuses', HSTORE='hands';
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains(STORE)){
        const s=db.createObjectStore(STORE,{keyPath:'id'});
        s.createIndex('dateStr','dateStr');
      }
      if(!db.objectStoreNames.contains(BSTORE)){
        db.createObjectStore(BSTORE,{keyPath:'id',autoIncrement:true});
      }
      if(!db.objectStoreNames.contains(HSTORE)){
        db.createObjectStore(HSTORE,{keyPath:'id'});
      }
    };
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e.target.error);
  });
}
async function dbGetAll(){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const req=db.transaction(STORE,'readonly').objectStore(STORE).getAll();
    req.onsuccess=()=>res(req.result);
    req.onerror=()=>rej(req.error);
  });
}
async function dbPutMany(records){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,'readwrite');
    const store=tx.objectStore(STORE);
    let added=0,skipped=0;
    const p=records.map(r=>new Promise(done=>{
      const g=store.get(r.id);
      g.onsuccess=()=>{ if(g.result){skipped++;}else{store.put(r);added++;} done(); };
      g.onerror=()=>{ skipped++; done(); };
    }));
    Promise.all(p).then(()=>{ tx.oncomplete=()=>res({added,skipped}); });
    tx.onerror=()=>rej(tx.error);
  });
}
async function dbClear(){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,'readwrite');
    tx.objectStore(STORE).clear();
    tx.oncomplete=res; tx.onerror=()=>rej(tx.error);
  });
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// HAND HISTORY PARSER
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

// Normalise card rank: TвҶ’T, JвҶ’J etc. keeps them as-is
const RANKS=['2','3','4','5','6','7','8','9','T','J','Q','K','A'];
const RANK_IDX={};
RANKS.forEach((r,i)=>RANK_IDX[r]=i);

function normalizeHand(c1,c2){
  // c1,c2 like "Ac","Kd" вҶ’ canonical hand key
  const r1=c1[0].toUpperCase(), s1=c1[1].toLowerCase();
  const r2=c2[0].toUpperCase(), s2=c2[1].toLowerCase();
  const suited=s1===s2;
  // sort by rank desc
  const [hi,lo]=RANK_IDX[r1]>=RANK_IDX[r2]?[r1,r2]:[r2,r1];
  if(hi===lo) return hi+lo; // pair like "AA"
  return hi+lo+(suited?'s':'o');
}

function determinePosition(heroSeat, buttonSeat, seats){
  // seats = array of active seat numbers
  const n=seats.length;
  const btnIdx=seats.indexOf(buttonSeat);
  if(btnIdx===-1) return 'BTN';
  const heroIdx=seats.indexOf(heroSeat);
  if(heroIdx===-1) return '?';
  // relative position clockwise from button
  const rel=(heroIdx-btnIdx+n)%n;
  if(rel===0) return 'BTN';
  if(rel===n-1) return 'SB';
  if(rel===n-2) return 'BB';
  if(rel===1) return 'UTG';
  return 'MP';
}

function parseHandBlock(block){
  try{
    // Hand ID
    const idM=block.match(/Poker Hand #([^\s:]+)/);
    if(!idM) return null;
    const id=idM[1];

    // Date
    const dm=block.match(/- (\d{4}\/\d{2}\/\d{2} \d{2}:\d{2}:\d{2})/);
    const dateStr=dm?dm[1].replace(/\//g,'-'):'';

    // Button seat
    const btnM=block.match(/Seat #(\d+) is the button/);
    const buttonSeat=btnM?parseInt(btnM[1]):null;

    // Parse seats and starting chips
    const seatReg=/Seat (\d+): (\S+) \(([\d,]+) in chips\)/g;
    let m, seats=[], heroSeat=null, heroChipsBefore=0;
    while((m=seatReg.exec(block))!==null){
      const sn=parseInt(m[1]);
      const name=m[2];
      const chips=parseInt(m[3].replace(/,/g,''));
      seats.push(sn);
      if(name==='Hero'){ heroSeat=sn; heroChipsBefore=chips; }
    }
    if(!heroSeat) return null;

    // Hero's hole cards
    const hcM=block.match(/Dealt to Hero \[(\S+) (\S+)\]/);
    if(!hcM) return null;
    const hand=normalizeHand(hcM[1],hcM[2]);

    // Position
    const pos=determinePosition(heroSeat, buttonSeat, seats);

    // Hero chips after = heroChipsBefore + net
    // Net: sum of all "Hero collected X" minus all bets/calls by Hero
    // Easier: look at SUMMARY for Hero's chip count change
    // GGPoker summary shows: "Seat N: Hero ... and won/lost"
    // But doesn't show final chips. Instead track stack change:
    // chipEV = chips_won - chips_invested
    let invested=0, collected=0;

    // What hero invested (calls, bets, raises, blinds)
    const heroActions=block.match(/^Hero: .+$/gm)||[];
    for(const line of heroActions){
      // posts blind
      const postM=line.match(/posts (?:small|big) blind ([\d,]+)/);
      if(postM){ invested+=parseInt(postM[1].replace(/,/g,'')); continue; }
      // calls
      const callM=line.match(/calls ([\d,]+)/);
      if(callM){ invested+=parseInt(callM[1].replace(/,/g,'')); continue; }
      // bets
      const betM=line.match(/bets ([\d,]+)/);
      if(betM){ invested+=parseInt(betM[1].replace(/,/g,'')); continue; }
      // raises to
      const raiseM=line.match(/raises [\d,]+ to ([\d,]+)/);
      if(raiseM){ invested+=parseInt(raiseM[1].replace(/,/g,'')); continue; }
      // is all-in covered by raises/calls above
    }

    // What hero collected
    const collectReg=/Hero collected ([\d,]+) from/g;
    let cm;
    while((cm=collectReg.exec(block))!==null){
      collected+=parseInt(cm[1].replace(/,/g,''));
    }
    // Also "Hero: collected" format
    const collect2Reg=/Hero: collected \(([\d,]+)\)/g;
    while((cm=collect2Reg.exec(block))!==null){
      collected+=parseInt(cm[1].replace(/,/g,''));
    }

    // Uncalled bet returned to Hero
    const uncalledM=block.match(/Uncalled bet \(([\d,]+)\) returned to Hero/);
    if(uncalledM) invested-=parseInt(uncalledM[1].replace(/,/g,''));

    const chipEV=collected-invested;

    return {id, dateStr, hand, pos, heroChipsBefore, chipEV, invested, collected};
  }catch(e){ return null; }
}

function parseHandHistoryText(text){
  const blocks=text.split(/(?=Poker Hand #)/g).filter(b=>b.trim().length>10);
  return blocks.map(b=>parseHandBlock(b)).filter(Boolean);
}

function buildChipEvChart(hands){
  let cum=0;
  const data=hands.map(h=>{ cum+=h.chipEV; return cum; });
  const last=data[data.length-1]||0;
  const color=last>=0?'#22d97a':'#f04060';
  const ctx=document.getElementById('chartChipEv').getContext('2d');
  const g=ctx.createLinearGradient(0,0,0,220);
  g.addColorStop(0,last>=0?'rgba(34,217,122,0.2)':'rgba(240,64,96,0.2)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  hhCharts.ev=new Chart(ctx,{
    type:'line',
    data:{labels:hands.map((_,i)=>i+1),datasets:[{data,borderColor:color,backgroundColor:g,borderWidth:2,pointRadius:0,pointHoverRadius:5,fill:true,tension:0.3}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{...TOOLTIP_BASE,callbacks:{
        title:items=>`Р СғРәР° #${items[0].dataIndex+1}`,
        label:item=>` ${item.raw>=0?'+':''}${item.raw} С„РёСҲРөРә`
      }}},
      scales:{
        x:{grid:{color:GRID_COLOR},ticks:{...TICK_STYLE,maxTicksLimit:12}},
        y:{grid:{color:GRID_COLOR},ticks:{...TICK_STYLE,callback:v=>`${v>=0?'+':''}${v}`}}
      }
    }
  });
}

// 13Г—13 hand matrix
function buildHandMatrix(hands){
  const filtered=currentPos==='ALL'?hands:hands.filter(h=>h.pos===currentPos);
  // aggregate by hand key
  const stats={};
  filtered.forEach(h=>{
    if(!stats[h.hand]) stats[h.hand]={ev:0,count:0};
    stats[h.hand].ev+=h.chipEV; stats[h.hand].count++;
  });
  // find range for color
  const evVals=Object.values(stats).map(s=>s.ev);
  const maxAbs=Math.max(1,...evVals.map(Math.abs));

  function cellColor(ev,count){
    if(!count) return '#0d0d1a';
    const t=Math.min(Math.abs(ev)/maxAbs,1);
    if(ev>=0){
      return `rgba(34,${Math.round(100+117*t)},${Math.round(122*(1-t*0.5))},${0.5+t*0.45})`;
    } else {
      return `rgba(240,${Math.round(64*(1-t))},${Math.round(96*(1-t))},${0.5+t*0.45})`;
    }
  }

  // Build 13Г—13 grid: rows=hi rank, cols=lo rank
  // Upper-right triangle = suited (hi>lo), lower-left = offsuit, diagonal = pairs
  let html='<table class="hand-matrix"><tr><td class="hm-header"></td>';
  RANKS.slice().reverse().forEach(r=>{ html+=`<td class="hm-header">${r}</td>`; });
  html+='</tr>';

  RANKS.slice().reverse().forEach(r1=>{
    html+=`<tr><td class="hm-label-row">${r1}</td>`;
    RANKS.slice().reverse().forEach(r2=>{
      let key;
      const i1=RANK_IDX[r1], i2=RANK_IDX[r2];
      if(i1===i2) key=r1+r2; // pair
      else if(i1>i2) key=r1+r2+'s'; // suited (upper triangle)
      else key=r2+r1+'o'; // offsuit (lower triangle)

      const s=stats[key]||{ev:0,count:0};
      const bg=cellColor(s.ev,s.count);
      const textCol=s.count?'rgba(0,0,0,0.85)':'#1e1e35';
      const evStr=s.count?(s.ev>=0?'+':'')+s.ev:'';
      const cntStr=s.count?s.count:'';
      const title=s.count?`${key}: ${evStr} chips (${cntStr} СҖСғРә)`:'';
      const isPair=i1===i2, isSuited=i1>i2;
      const labelStyle=isPair?'color:#f5c842':isSuited?'color:#4f8eff':'';
      html+=`<td style="background:${bg};color:${textCol}" title="${title}">
        <div style="font-size:8px;line-height:1;${labelStyle}">${key.length<=2?key:key.slice(0,2)}</div>
        <div style="font-size:7px;opacity:0.85">${evStr}</div>
      </td>`;
    });
    html+='</tr>';
  });
  html+='</table>';
  document.getElementById('handMatrix').innerHTML=html;
}

function buildTopHands(hands){
  const filtered=currentPos==='ALL'?hands:hands.filter(h=>h.pos===currentPos);
  const stats={};
  filtered.forEach(h=>{
    if(!stats[h.hand]) stats[h.hand]={ev:0,count:0,hand:h.hand};
    stats[h.hand].ev+=h.chipEV; stats[h.hand].count++;
  });
  const sorted=Object.values(stats).sort((a,b)=>topMode==='best'?b.ev-a.ev:a.ev-b.ev);
  const top=sorted.slice(0,15);
  document.getElementById('topHandsWrap').innerHTML=`
    <table class="top-hands-table">
      <thead><tr><th>Р СғРәР°</th><th>ChipEV</th><th>Р СғРә</th><th>Avg</th></tr></thead>
      <tbody>${top.map(s=>{
        const col=s.ev>=0?'var(--green)':'var(--red)';
        const avg=s.count?Math.round(s.ev/s.count):0;
        return `<tr>
          <td style="color:var(--text);font-weight:700">${s.hand}</td>
          <td style="color:${col}">${s.ev>=0?'+':''}${s.ev}</td>
          <td style="color:var(--muted)">${s.count}</td>
          <td style="color:${avg>=0?'var(--green)':'var(--red)'}">${avg>=0?'+':''}${avg}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
}

function buildHhKpi(hands){
  const totalEv=hands.reduce((s,h)=>s+h.chipEV,0);
  const wins=hands.filter(h=>h.chipEV>0).length;
  const positions=[...new Set(hands.map(h=>h.pos))];
  const bestPos=positions.sort((a,b)=>{
    const ea=hands.filter(h=>h.pos===a).reduce((s,h)=>s+h.chipEV,0);
    const eb=hands.filter(h=>h.pos===b).reduce((s,h)=>s+h.chipEV,0);
    return eb-ea;
  })[0]||'вҖ”';
  const uniqueHands=[...new Set(hands.map(h=>h.hand))].length;
  const avgEv=hands.length?Math.round(totalEv/hands.length):0;

  document.getElementById('hhKpiRow').innerHTML=[
    {label:'Р СғРә СҒСӢРіСҖР°РҪРҫ',val:hands.length,sub:'РІСҒРөРіРҫ',color:'var(--text)',accent:'var(--blue)'},
    {label:'РқР°РәРҫРҝР». ChipEV',val:(totalEv>=0?'+':'')+totalEv,sub:'С„РёСҲРөРә',color:totalEv>=0?'var(--green)':'var(--red)',accent:totalEv>=0?'var(--green)':'var(--red)'},
    {label:'Avg ChipEV/СҖСғРәР°',val:(avgEv>=0?'+':'')+avgEv,sub:'С„РёСҲРөРә Р·Р° СҖСғРәСғ',color:avgEv>=0?'var(--green)':'var(--red)',accent:'var(--gold)'},
    {label:'Р’СӢРёРіСҖР°РҪРҪСӢС… СҖСғРә',val:`${Math.round(wins/hands.length*100)}%`,sub:`${wins} РёР· ${hands.length}`,color:'var(--blue)',accent:'var(--blue)'},
    {label:'РӣСғСҮСҲР°СҸ РҝРҫР·РёСҶРёСҸ',val:bestPos,sub:'РҝРҫ ChipEV',color:'var(--purple)',accent:'var(--purple)'},
    {label:'РЈРҪРёРәР°Р»СҢРҪСӢС… СҖСғРә',val:uniqueHands,sub:'СӮРёРҝРҫРІ РәРҫРјРұРёРҪР°СҶРёР№',color:'var(--muted)',accent:'var(--border2)'},
  ].map(k=>`<div class="kpi"><div class="kpi-accent" style="background:${k.accent}"></div>
    <div class="kpi-label">${k.label}</div>
    <div class="kpi-val" style="color:${k.color};font-size:24px">${k.val}</div>
    <div class="kpi-sub">${k.sub}</div></div>`).join('');
}

function renderHh(hands){
  allHands=hands;
  destroyHhCharts();
  buildHhKpi(hands);
  buildChipEvChart(hands);
  buildChipEvBarChart(hands);
  buildPositionChart(hands);
  buildHandMatrix(hands);
  buildTopHands(hands);
  document.getElementById('hhResults').style.display='block';
}

// HH ZIP PROCESSING
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
async function processHhZip(file){
  const pw=document.getElementById('hhProgressWrap');
  const fill=document.getElementById('hhBarFill');
  const cnt=document.getElementById('hhProgressCount');
  const fname=document.getElementById('hhProgressFile');
  pw.classList.add('show'); fill.style.width='0%';

  let zip;
  try{ zip=await JSZip.loadAsync(file); }
  catch(e){ pw.classList.remove('show'); showToast('РһСҲРёРұРәР° РҫСӮРәСҖСӢСӮРёСҸ ZIP','red'); return; }

  const txtFiles=Object.values(zip.files).filter(f=>!f.dir&&f.name.toLowerCase().endsWith('.txt'));
  const total=txtFiles.length;
  if(!total){ pw.classList.remove('show'); showToast('РқРөСӮ .txt С„Р°Р№Р»РҫРІ РІ Р°СҖС…РёРІРө','red'); return; }
  cnt.textContent=`0 / ${total}`;

  const parsed=[]; let done=0;
  for(const f of txtFiles){
    try{
      const text=await f.async('text');
      const name=f.name.split('/').pop();
      const hs=parseHandHistoryText(text);
      parsed.push(...hs);
      done++;
      fill.style.width=Math.round(done/total*100)+'%';
      cnt.textContent=`${done} / ${total}`;
      fname.textContent=name;
    }catch(e){}
  }
  await new Promise(r=>setTimeout(r,250));
  pw.classList.remove('show');

  if(!parsed.length){ showToast('РқРө СғРҙР°Р»РҫСҒСҢ СҖР°СҒРҝРҫР·РҪР°СӮСҢ СҖСғРәРё','red'); return; }

  const {added,skipped}=await handsPutMany(parsed);
  if(skipped>0&&added>0) showToast(`вң… Р”РҫРұР°РІР»РөРҪРҫ ${added} СҖСғРә В· вҸӯ Р”СғРұР»РөР№: ${skipped}`,'green');
  else if(added>0) showToast(`вң… Р”РҫРұР°РІР»РөРҪРҫ ${added} СҖСғРә`,'green');
  else showToast(`вҸӯ Р’СҒРө ${skipped} СҖСғРә СғР¶Рө РІ РұР°Р·Рө`,'gold');

  const all=await handsGetAll();
  renderHh(all);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// DATE HELPERS вҖ” РёРіСҖРҫРІРҫР№ РҙРөРҪСҢ РҪР°СҮРёРҪР°РөСӮСҒСҸ РІ 11:00
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// "РҳРіСҖРҫРІРҫР№ РҙРөРҪСҢ" = РөСҒР»Рё СҮР°СҒ < 11, СҒСҮРёСӮР°РөРј РҝСҖРөРҙСӢРҙСғСүРёРј РҙРҪС‘Рј
function gameDay(dateStr){
  // dateStr: "2026-05-04 22:55:06"
  if(!dateStr) return '';
  const d=new Date(dateStr.replace(' ','T'));
  if(isNaN(d)) return '';
  if(d.getHours()<11) d.setDate(d.getDate()-1);
  return d.toISOString().slice(0,10); // "2026-05-04"
}
function gameHour(dateStr){
  if(!dateStr) return null;
  const d=new Date(dateStr.replace(' ','T'));
  return isNaN(d)?null:d.getHours();
}
function gameWeekday(dateStr){
  // 0=РҹРҪ вҖҰ 6=Р’СҒ (РёРіСҖРҫРІРҫР№ РҙРөРҪСҢ)
  if(!dateStr) return null;
  const d=new Date(dateStr.replace(' ','T'));
  if(isNaN(d)) return null;
  if(d.getHours()<11) d.setDate(d.getDate()-1);
  return (d.getDay()+6)%7; // JS: 0=Sun вҶ’ shift to Mon=0
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// PARSER
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function parseTournamentFile(text,filename){
  try{
    const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
    const idMatch=filename.match(/Tournament #(\d+)/)||lines[0]?.match(/Tournament #(\d+)/);
    const id=idMatch?idMatch[1]:null;
    if(!id) return null;
    const buyin=parseFloat((text.match(/Buy-in:\s*\$?([\d.]+)/i)||[])[1])||0;
    const prizePool=parseFloat((text.match(/Total Prize Pool:\s*\$?([\d.]+)/i)||[])[1])||0;
    const dm=text.match(/Tournament started (\d{4}\/\d{2}\/\d{2} \d{2}:\d{2}:\d{2})/i);
    const dateStr=dm?dm[1].replace(/\//g,'-'):'';
    const pm=text.match(/You finished in (\d+)(?:st|nd|rd|th) place/i);
    const place=pm?parseInt(pm[1]):null;
    const players=parseInt((text.match(/(\d+) Players/i)||[])[1])||0;
    const wm=text.match(/\d+(?:st|nd|rd|th)\s*:\s*Hero,\s*\$?([\d.]+)/i);
    const winnings=wm?parseFloat(wm[1]):0;
    const pnl=Math.round((winnings-buyin)*100)/100;
    return {id,buyin,prizePool,dateStr,place,players,winnings,pnl};
  }catch(e){return null;}
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// FILTER STATE
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
let allTournaments=[];
let allBonuses=[];      // loaded from DB
let activeBuyins=new Set();
let dateFrom='', dateTo='';
let pnlMode='all';
let roiMode='hour';

function getFiltered(){
  return allTournaments.filter(t=>{
    if(activeBuyins.size>0 && !activeBuyins.has(String(t.buyin.toFixed(2)))) return false;
    if(dateFrom||dateTo){
      const gd=gameDay(t.dateStr);
      if(dateFrom && gd < dateFrom) return false;
      if(dateTo   && gd > dateTo)   return false;
    }
    return true;
  });
}

const TOOLTIP_BASE={
  backgroundColor:'#161626',borderColor:'#2a2a45',borderWidth:1,
  titleColor:'#5a5a80',bodyColor:'#e2e2f0',
  titleFont:{family:'Space Mono',size:10},
  bodyFont:{family:'Space Mono',size:12}
};
const GRID_COLOR='rgba(30,30,53,0.9)';
const TICK_STYLE={color:'#5a5a80',font:{family:'Space Mono',size:9}};

function buildPnlChart(ts){
  const ctx=document.getElementById('chartPnl').getContext('2d');
  let labels,data,bonusPoints=[];

  // Get bonuses within filter date range
  const filteredBonuses=allBonuses.filter(b=>{
    if(dateFrom && b.date<dateFrom) return false;
    if(dateTo && b.date>dateTo) return false;
    return true;
  });

  if(pnlMode==='day'){
    const byDay={};
    ts.forEach(t=>{ const d=gameDay(t.dateStr)||'?'; byDay[d]=(byDay[d]||0)+t.pnl; });
    // add bonuses to days
    filteredBonuses.forEach(b=>{ byDay[b.date]=(byDay[b.date]||0)+b.amount; });
    const days=Object.keys(byDay).sort();
    let cum=0;
    labels=days;
    data=days.map(d=>{ cum=Math.round((cum+byDay[d])*100)/100; return cum; });
    // mark bonus days
    days.forEach((d,i)=>{
      const dayBonus=filteredBonuses.filter(b=>b.date===d).reduce((s,b)=>s+b.amount,0);
      if(dayBonus>0) bonusPoints.push({x:i,y:data[i],amount:dayBonus,date:d});
    });
  } else {
    ts.sort((a,b)=>a.dateStr.localeCompare(b.dateStr));
    // merge tournaments and bonuses on timeline
    // bonuses get inserted at their date position
    let cum=0;
    data=ts.map(t=>{ cum=Math.round((cum+t.pnl)*100)/100; return cum; });
    labels=ts.map((_,i)=>i+1);
    // show bonus total separately (not merged into line, shown as annotation points)
    // For simplicity just mark last tournament of each bonus day
    filteredBonuses.forEach(b=>{
      // find last tournament on or before bonus date
      let insertIdx=ts.length-1;
      for(let i=ts.length-1;i>=0;i--){
        if(gameDay(ts[i].dateStr)<=b.date){ insertIdx=i; break; }
      }
      if(insertIdx>=0) bonusPoints.push({x:insertIdx,y:data[insertIdx],amount:b.amount,date:b.date,note:b.note});
    });
  }

  const last=data[data.length-1]||0;
  const color=last>=0?'#22d97a':'#f04060';
  const g=ctx.createLinearGradient(0,0,0,240);
  g.addColorStop(0,last>=0?'rgba(34,217,122,0.25)':'rgba(240,64,96,0.25)');
  g.addColorStop(1,'rgba(0,0,0,0)');

  // Bonus scatter: store extra info in a parallel array indexed by bonusPoints order
  // Use simple numeric index as x so it aligns with the line dataset labels
  const bonusMeta=bonusPoints; // keep reference for tooltip lookup

  const bonusDataset=bonusPoints.length>0?[{
    type:'scatter',
    label:'Р‘РҫРҪСғСҒ',
    data:bonusPoints.map(p=>({x:p.x, y:p.y})),
    backgroundColor:'rgba(168,85,247,0.9)',
    borderColor:'rgba(168,85,247,0.5)',
    borderWidth:2,
    pointRadius:9,
    pointStyle:'triangle',
    pointHoverRadius:12,
    yAxisID:'y',
  }]:[];

  charts.pnl=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[
      {
        label:'P&L',
        data,
        borderColor:color,backgroundColor:g,
        borderWidth:2,pointRadius:0,pointHoverRadius:5,
        pointHoverBackgroundColor:color,
        fill:true,tension:0.3,
      },
      ...bonusDataset
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{
          display:bonusPoints.length>0,
          labels:{color:'#5a5a80',font:{family:'Space Mono',size:9},boxWidth:8,
            filter:item=>item.text==='Р‘РҫРҪСғСҒ'}
        },
        tooltip:{...TOOLTIP_BASE,callbacks:{
          title:items=>{
            const item=items[0];
            if(item.dataset.label==='Р‘РҫРҪСғСҒ'){
              const bp=bonusMeta[item.dataIndex];
              return `рҹҺҒ Р‘РҫРҪСғСҒ В· ${bp?bp.date:''}`;
            }
            return pnlMode==='day'
              ? `Р”РөРҪСҢ: ${labels[item.dataIndex]}`
              : `РўСғСҖРҪРёСҖ #${item.dataIndex+1}`;
          },
          label:item=>{
            if(item.dataset.label==='Р‘РҫРҪСғСҒ'){
              const bp=bonusMeta[item.dataIndex];
              if(!bp) return '';
              return [
                ` +$${bp.amount.toFixed(2)}${bp.note?' В· '+bp.note:''}`,
                ` РқР°СҖР°СҒСӮР°СҺСүРёР№: $${(item.raw.y||0).toFixed(2)}`
              ];
            }
            const v=typeof item.raw==='number'?item.raw:0;
            return ` ${v>=0?'+':''}$${v.toFixed(2)}`;
          }
        }}
      },
      scales:{
        x:{
          grid:{color:GRID_COLOR},
          ticks:{...TICK_STYLE,maxTicksLimit:12,callback:(_,i)=>labels[i]}
        },
        y:{grid:{color:GRID_COLOR},ticks:{...TICK_STYLE,callback:v=>`$${v.toFixed(2)}`}}
      }
    }
  });
}

// в”Җв”Җ Heatmap: hour (rows) Г— weekday (cols) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function buildHeatmap(ts){
  const WEEK=['РҹРҪ','Р’СӮ','РЎСҖ','Р§СӮ','РҹСӮ','РЎРұ','Р’СҒ'];
  // hour ordered from 11
  const HOURS=[...Array(24).keys()].map(i=>(i+11)%24);

  // aggregate
  const data={}; // data[h][d] = {pnl,buyin,count}
  HOURS.forEach(h=>{ data[h]={}; for(let d=0;d<7;d++) data[h][d]={pnl:0,buyin:0,count:0}; });
  ts.forEach(t=>{
    const h=gameHour(t.dateStr), d=gameWeekday(t.dateStr);
    if(h!==null&&d!==null){ data[h][d].pnl+=t.pnl; data[h][d].buyin+=t.buyin; data[h][d].count++; }
  });

  // find range
  const rois=[];
  HOURS.forEach(h=>{ for(let d=0;d<7;d++){ const g=data[h][d]; if(g.count>0&&g.buyin>0) rois.push(g.pnl/g.buyin*100); }});
  const maxAbs=rois.length?Math.max(1,...rois.map(Math.abs)):1;

  function roiColor(roi,count){
    if(count===0) return '#1a1a2a';
    const t=Math.min(Math.abs(roi)/maxAbs,1);
    if(roi>=0){
      const r=Math.round(34+(217-34)*t), g=Math.round(217+(255-217)*(1-t)), b=Math.round(122+(80-122)*(1-t));
      return `rgba(${r},${g},${b},0.85)`;
    } else {
      const r=Math.round(240), g2=Math.round(64*(1-t)), b2=Math.round(96*(1-t));
      return `rgba(${r},${g2},${b2},0.85)`;
    }
  }

  const wrap=document.getElementById('heatmapWrap');
  // build table-style grid
  let html='<div style="display:grid;grid-template-columns:40px repeat(7,1fr);gap:3px;min-width:400px">';
  // header row
  html+='<div></div>';
  WEEK.forEach(d=>{ html+=`<div style="text-align:center;font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;padding:4px 0;">${d}</div>`; });

  HOURS.forEach(h=>{
    html+=`<div style="display:flex;align-items:center;justify-content:flex-end;font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;padding-right:6px">${String(h).padStart(2,'0')}</div>`;
    for(let d=0;d<7;d++){
      const g=data[h][d];
      const roi=g.buyin>0?Math.round(g.pnl/g.buyin*1000)/10:0;
      const bg=roiColor(roi,g.count);
      const textColor=g.count===0?'#2a2a45':'rgba(0,0,0,0.85)';
      const tip=g.count>0?`ROI:${roi}% (${g.count})`:'';
      html+=`<div class="hm-cell" style="background:${bg};min-height:44px" title="${tip}">
        <div class="hm-label" style="color:${textColor};opacity:0.7">${g.count||''}</div>
        <div class="hm-val" style="color:${textColor}">${g.count>0?(roi>=0?'+':'')+roi+'%':''}</div>
      </div>`;
    }
  });
  html+='</div>';
  wrap.innerHTML=html;
}

function buildPlaceBars(ts){
  const counts={};
  ts.forEach(t=>{ if(t.place!==null) counts[t.place]=(counts[t.place]||0)+1; });
  const places=Object.keys(counts).map(Number).sort((a,b)=>a-b);
  const max=Math.max(...Object.values(counts),1);
  const placeColors={1:'#f5c842',2:'#c0c0d0',3:'#cd7f32'};
  document.getElementById('placeBars').innerHTML=places.map(p=>{
    const count=counts[p];
    const pct=(count/max*100).toFixed(1);
    const color=placeColors[p]||'#4f8eff';
    const label=p===1?'рҹҘҮ':p===2?'рҹҘҲ':p===3?'рҹҘү':`${p}th`;
    return `<div class="place-row">
      <div class="place-badge">${label}</div>
      <div class="place-bar-track"><div class="place-bar-fill" style="width:${pct}%;background:${color}">${count}</div></div>
      <div class="place-count">${Math.round(count/ts.length*100)}%</div>
    </div>`;
  }).join('');
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// KPI
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function buildKpi(ts){
  const total=ts.length;
  if(!total){ document.getElementById('kpiRow').innerHTML='<div class="no-data">РқРөСӮ РҙР°РҪРҪСӢС… РҝРҫ РІСӢРұСҖР°РҪРҪСӢРј С„РёР»СҢСӮСҖР°Рј</div>'; return; }
  const totalBuyin=Math.round(ts.reduce((s,t)=>s+t.buyin,0)*100)/100;
  const totalWon=Math.round(ts.reduce((s,t)=>s+t.winnings,0)*100)/100;
  const totalPnl=Math.round((totalWon-totalBuyin)*100)/100;
  const wins=ts.filter(t=>t.place===1).length;
  const itm=ts.filter(t=>t.winnings>0).length;
  const roi=totalBuyin>0?((totalPnl/totalBuyin)*100).toFixed(1):'0';
  const best=Math.max(...ts.map(t=>t.pnl));
  const worst=Math.min(...ts.map(t=>t.pnl));

  // Bonuses within filter range
  const filteredBonuses=allBonuses.filter(b=>{
    if(dateFrom && b.date<dateFrom) return false;
    if(dateTo && b.date>dateTo) return false;
    return true;
  });
  const totalBonus=Math.round(filteredBonuses.reduce((s,b)=>s+b.amount,0)*100)/100;
  const totalWithBonus=Math.round((totalPnl+totalBonus)*100)/100;

  const kpis=[
    {label:'P&L (СӮСғСҖРҪРёСҖСӢ)',val:`${totalPnl>=0?'+':''}$${Math.abs(totalPnl).toFixed(2)}`,sub:`${total} СӮСғСҖРҪРёСҖРҫРІ`,color:totalPnl>=0?'#22d97a':'#f04060',accent:totalPnl>=0?'#22d97a':'#f04060'},
    {label:'Р‘РҫРҪСғСҒСӢ',val:`+$${totalBonus.toFixed(2)}`,sub:`${filteredBonuses.length} РІСӢРҝР»Р°СӮ`,color:'#a855f7',accent:'#a855f7'},
    {label:'РҳСӮРҫРіРҫ СҒ РұРҫРҪСғСҒР°РјРё',val:`${totalWithBonus>=0?'+':''}$${Math.abs(totalWithBonus).toFixed(2)}`,sub:'P&L + Р»РёРҙРөСҖРұРҫСҖРҙ + СҖРөР№РәРұСҚРә',color:totalWithBonus>=0?'#22d97a':'#f04060',accent:totalWithBonus>=0?'#22d97a':'#f04060'},
    {label:'ROI',val:`${roi}%`,sub:'Р’РҫР·РІСҖР°СӮ РҪР° РұР°Р№-РёРҪ',color:parseFloat(roi)>=0?'#22d97a':'#f04060',accent:'#f5c842'},
    {label:'ITM',val:`${(itm/total*100).toFixed(1)}%`,sub:`${itm} РёР· ${total}`,color:'#4f8eff',accent:'#4f8eff'},
    {label:'РҹРҫРұРөРҙСӢ',val:`${wins}`,sub:`Win rate: ${(wins/total*100).toFixed(1)}%`,color:'#f5c842',accent:'#f5c842'},
    {label:'РӣСғСҮСҲРёР№',val:`+$${best.toFixed(2)}`,sub:'РңР°РәСҒ РІСӢРёРіСҖСӢСҲ',color:'#22d97a',accent:'#22d97a'},
    {label:'РҘСғРҙСҲРёР№',val:`-$${Math.abs(worst).toFixed(2)}`,sub:'РңР°РәСҒ РҝРҫСӮРөСҖСҸ',color:'#f04060',accent:'#f04060'},
  ];
  document.getElementById('kpiRow').innerHTML=kpis.map(k=>`
    <div class="kpi">
      <div class="kpi-accent" style="background:${k.accent}"></div>
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-val" style="color:${k.color}">${k.val}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`).join('');
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// TABLE
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function buildTable(ts){
  let cum=0;
  document.getElementById('tableBody').innerHTML=ts.map((t,i)=>{
    cum=Math.round((cum+t.pnl)*100)/100;
    const pc=t.place===1?'chip-1':t.place===2?'chip-2':t.place===3?'chip-3':'chip-n';
    const pnlH=t.pnl>=0?`<span class="mono" style="color:var(--green)">+$${t.pnl.toFixed(2)}</span>`:`<span class="mono" style="color:var(--red)">-$${Math.abs(t.pnl).toFixed(2)}</span>`;
    const cumH=cum>=0?`<span class="mono" style="color:var(--green)">+$${cum.toFixed(2)}</span>`:`<span class="mono" style="color:var(--red)">-$${Math.abs(cum).toFixed(2)}</span>`;
    const date=t.dateStr?t.dateStr.slice(0,16):'вҖ”';
    const gd=gameDay(t.dateStr)||'вҖ”';
    return `<tr>
      <td class="mono" style="color:var(--muted)">${i+1}</td>
      <td style="color:var(--muted);font-size:11px">${date}</td>
      <td style="color:var(--muted);font-size:11px">${gd}</td>
      <td class="mono" style="color:var(--muted);font-size:10px">#${t.id.slice(-8)}</td>
      <td class="mono" style="color:var(--text)">$${t.buyin.toFixed(2)}</td>
      <td class="mono" style="color:var(--muted)">$${t.prizePool.toFixed(2)}</td>
      <td><span class="place-chip ${pc}">${t.place??'?'}</span></td>
      <td class="mono" style="color:var(--text)">$${t.winnings.toFixed(2)}</td>
      <td>${pnlH}</td>
      <td>${cumH}</td>
    </tr>`;
  }).join('');
  document.getElementById('tableCount').textContent=`${ts.length} Р·Р°РҝРёСҒРөР№`;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// BUILD BUYIN FILTER BUTTONS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function buildBuyinFilters(){
  const buyins=[...new Set(allTournaments.map(t=>t.buyin.toFixed(2)))].sort((a,b)=>parseFloat(a)-parseFloat(b));
  const container=document.getElementById('buyinFilters');
  container.innerHTML=buyins.map(b=>`<button class="fbtn ${activeBuyins.has(b)?'active':''}" data-buyin="${b}">$${b}</button>`).join('');
  container.querySelectorAll('.fbtn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const b=btn.dataset.buyin;
      if(activeBuyins.has(b)) activeBuyins.delete(b); else activeBuyins.add(b);
      btn.classList.toggle('active');
      refreshAll();
    });
  });
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// REFRESH вҖ” rebuild all charts with current filters
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function refreshAll(){
  const ts=getFiltered();
  ts.sort((a,b)=>a.dateStr.localeCompare(b.dateStr));

  // filter count label
  const total=allTournaments.length;
  document.getElementById('filterCount').textContent=ts.length<total?`(${ts.length} РёР· ${total})`:`(${total})`;

  destroyCharts();
  buildKpi(ts);
  buildPnlChart(ts);
  buildBarChart(ts);
  buildDonutChart(ts);
  buildBuyinPnlChart(ts);
  buildPlaceBars(ts);
  buildRoiChart(ts);
  buildHeatmap(ts);
  buildTable(ts);
}

// BONUS UI
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const TYPE_LABELS={leaderboard:'рҹҸҶ РӣРёРҙРөСҖРұРҫСҖРҙ',rakeback:'рҹ’ё Р РөР№РәРұСҚРә',other:'рҹҺҒ Р”СҖСғРіРҫРө'};
const TYPE_CSS={leaderboard:'type-lb',rakeback:'type-rb',other:'type-other'};

function renderBonusTable(){
  const tbody=document.getElementById('bonusTableBody');
  const sorted=[...allBonuses].sort((a,b)=>b.date.localeCompare(a.date));

  if(!sorted.length){
    tbody.innerHTML=`<tr><td colspan="6"><div class="bonus-empty">РқРөСӮ Р·Р°РҝРёСҒРөР№. Р”РҫРұР°РІСҢСӮРө РҝРөСҖРІСӢР№ РұРҫРҪСғСҒ РІСӢСҲРө.</div></td></tr>`;
  } else {
    tbody.innerHTML=sorted.map((b,i)=>`
      <tr>
        <td class="mono" style="color:var(--muted)">${sorted.length-i}</td>
        <td><span class="${TYPE_CSS[b.type]||'type-other'}">${TYPE_LABELS[b.type]||b.type}</span></td>
        <td class="mono" style="color:var(--muted)">${b.date}</td>
        <td class="mono" style="color:var(--purple)">+$${b.amount.toFixed(2)}</td>
        <td style="color:var(--muted);font-size:11px">${b.note||'вҖ”'}</td>
        <td><button class="bonus-del-btn" data-id="${b.id}">вң•</button></td>
      </tr>`).join('');

    tbody.querySelectorAll('.bonus-del-btn').forEach(btn=>{
      btn.addEventListener('click',async()=>{
        const id=parseInt(btn.dataset.id);
        await bonusDelete(id);
        allBonuses=allBonuses.filter(b=>b.id!==id);
        renderBonusTable();
        renderBonusSummary();
        refreshAll();
        showToast('рҹ—‘ Р‘РҫРҪСғСҒ СғРҙР°Р»С‘РҪ','red');
      });
    });
  }
}

function renderBonusSummary(){
  const lb=allBonuses.filter(b=>b.type==='leaderboard').reduce((s,b)=>s+b.amount,0);
  const rb=allBonuses.filter(b=>b.type==='rakeback').reduce((s,b)=>s+b.amount,0);
  const oth=allBonuses.filter(b=>b.type==='other').reduce((s,b)=>s+b.amount,0);
  const total=lb+rb+oth;
  document.getElementById('bonusSummary').innerHTML=`
    <div class="bonus-sum-item"><span class="bonus-sum-label type-lb">РӣРёРҙРөСҖРұРҫСҖРҙ:</span><span class="mono" style="color:var(--gold)">$${lb.toFixed(2)}</span></div>
    <div class="bonus-sum-item"><span class="bonus-sum-label type-rb">Р РөР№РәРұСҚРә:</span><span class="mono" style="color:var(--purple)">$${rb.toFixed(2)}</span></div>
    ${oth>0?`<div class="bonus-sum-item"><span class="bonus-sum-label type-other">Р”СҖСғРіРҫРө:</span><span class="mono" style="color:var(--blue)">$${oth.toFixed(2)}</span></div>`:''}
    <div class="bonus-sum-item" style="border-left:1px solid var(--border2);padding-left:20px"><span class="bonus-sum-label">РҳСӮРҫРіРҫ:</span><span class="mono" style="color:var(--green)">$${total.toFixed(2)}</span></div>`;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// RENDER вҖ” after loading data
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function render(tournaments){
  allTournaments=tournaments;
  allTournaments.sort((a,b)=>a.dateStr.localeCompare(b.dateStr));

  buildBuyinFilters();
  refreshAll();
  renderBonusTable();
  renderBonusSummary();

  document.getElementById('results').classList.add('show');
  document.getElementById('statusPill').textContent=`${tournaments.length} СӮСғСҖРҪРёСҖРҫРІ`;
  document.getElementById('statusPill').classList.add('active');
  document.getElementById('dropTitle').textContent='Р”РһР‘РҗР’РҳРўР¬ Р•Р©РҒ ZIP';

  const dates=tournaments.map(t=>gameDay(t.dateStr)).filter(Boolean).sort();
  const from=dates[0]||'вҖ”', to=dates[dates.length-1]||'вҖ”';
  document.getElementById('dbBarText').textContent=`${tournaments.length} СӮСғСҖРҪРёСҖРҫРІ В· ${from} вҶ’ ${to}`;
  document.getElementById('dbBar').classList.add('show');
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// ZIP PROCESSING
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
async function processZip(file){
  const errorBar=document.getElementById('errorBar');
  errorBar.classList.remove('show');
  const pw=document.getElementById('progressWrap');
  const fill=document.getElementById('barFill');
  const cnt=document.getElementById('progressCount');
  const fname=document.getElementById('progressFile');
  pw.classList.add('show'); fill.style.width='0%';

  let zip;
  try{ zip=await JSZip.loadAsync(file); }
  catch(e){ pw.classList.remove('show'); errorBar.textContent='РқРө СғРҙР°Р»РҫСҒСҢ РҫСӮРәСҖСӢСӮСҢ ZIP: '+e.message; errorBar.classList.add('show'); return; }

  const txtFiles=Object.values(zip.files).filter(f=>!f.dir&&f.name.toLowerCase().endsWith('.txt'));
  const total=txtFiles.length;
  if(!total){ pw.classList.remove('show'); errorBar.textContent='Р’ Р°СҖС…РёРІРө РҪРөСӮ .txt С„Р°Р№Р»РҫРІ'; errorBar.classList.add('show'); return; }
  cnt.textContent=`0 / ${total}`;

  const parsed=[]; let done=0;
  for(const f of txtFiles){
    try{
      const text=await f.async('text');
      const name=f.name.split('/').pop();
      const t=parseTournamentFile(text,name);
      if(t) parsed.push(t);
      done++;
      fill.style.width=Math.round(done/total*100)+'%';
      cnt.textContent=`${done} / ${total}`;
      fname.textContent=name;
    }catch(e){}
  }
  await new Promise(r=>setTimeout(r,300));
  pw.classList.remove('show');

  if(!parsed.length){ errorBar.textContent='РқРө СғРҙР°Р»РҫСҒСҢ СҖР°СҒРҝРҫР·РҪР°СӮСҢ РҪРё РҫРҙРҪРҫРіРҫ СӮСғСҖРҪРёСҖР°.'; errorBar.classList.add('show'); return; }

  const {added,skipped}=await dbPutMany(parsed);
  if(skipped>0&&added>0) showToast(`вң… Р”РҫРұР°РІР»РөРҪРҫ ${added} В· вҸӯ Р”СғРұР»РөР№ РҝСҖРҫРҝСғСүРөРҪРҫ: ${skipped}`,'green');
  else if(added>0) showToast(`вң… Р”РҫРұР°РІР»РөРҪРҫ ${added} РҪРҫРІСӢС… СӮСғСҖРҪРёСҖРҫРІ`,'green');
  else showToast(`вҸӯ Р’СҒРө ${skipped} СғР¶Рө РІ РұР°Р·Рө`,'gold');

  const all=await dbGetAll();
  render(all);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// INIT
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
async function init(){
  try{
    const [all, bonuses, hands]=await Promise.all([dbGetAll(), bonusGetAll(), handsGetAll()]);
    allBonuses=bonuses;
    document.getElementById('bonusDate').value=new Date().toISOString().slice(0,10);
    if(all.length>0) render(all);
    else {
      document.getElementById('statusPill').textContent='РқРөСӮ РҙР°РҪРҪСӢС…';
      if(bonuses.length>0){
        document.getElementById('results').classList.add('show');
        renderBonusTable(); renderBonusSummary();
      }
    }
    if(hands.length>0) renderHh(hands);
  }catch(e){ document.getElementById('statusPill').textContent='РқРөСӮ РҙР°РҪРҪСӢС…'; }
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// EVENTS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const dropZone=document.getElementById('dropZone');
const zipInput=document.getElementById('zipInput');
dropZone.addEventListener('click',()=>zipInput.click());
zipInput.addEventListener('change',e=>{ if(e.target.files[0]){processZip(e.target.files[0]); e.target.value='';} });
dropZone.addEventListener('dragover',e=>{ e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('over'));
dropZone.addEventListener('drop',e=>{ e.preventDefault(); dropZone.classList.remove('over'); if(e.dataTransfer.files[0]) processZip(e.dataTransfer.files[0]); });

document.getElementById('clearBtn').addEventListener('click',async()=>{
  if(!confirm('РЈРҙР°Р»РёСӮСҢ РІСҒРө РҙР°РҪРҪСӢРө, РІРәР»СҺСҮР°СҸ РұРҫРҪСғСҒСӢ?')) return;
  await Promise.all([dbClear(), bonusClear(), handsClear()]);
  allTournaments=[]; allBonuses=[]; allHands=[];
  destroyHhCharts();
  document.getElementById('hhResults').style.display='none';
  destroyCharts();
  document.getElementById('results').classList.remove('show');
  document.getElementById('statusPill').textContent='РқРөСӮ РҙР°РҪРҪСӢС…';
  document.getElementById('statusPill').classList.remove('active');
  document.getElementById('dbBar').classList.remove('show');
  document.getElementById('dropTitle').textContent='Р—РҗР“Р РЈР—РҳРўР• ZIP РҗР РҘРҳР’';
  showToast('рҹ—‘ Р‘Р°Р·Р° РҫСҮРёСүРөРҪР°','red');
});

document.getElementById('resetFilters').addEventListener('click',()=>{
  activeBuyins.clear();
  dateFrom=''; dateTo='';
  document.getElementById('dateFrom').value='';
  document.getElementById('dateTo').value='';
  document.querySelectorAll('#buyinFilters .fbtn').forEach(b=>b.classList.remove('active'));
  refreshAll();
});

document.getElementById('dateFrom').addEventListener('change',e=>{ dateFrom=e.target.value; refreshAll(); });
document.getElementById('dateTo').addEventListener('change',e=>{ dateTo=e.target.value; refreshAll(); });

// P&L tabs
document.getElementById('pnlTabs').addEventListener('click',e=>{
  const btn=e.target.closest('.tab'); if(!btn) return;
  document.querySelectorAll('#pnlTabs .tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  pnlMode=btn.dataset.mode;
  if(charts.pnl){ try{charts.pnl.destroy();}catch(e){} delete charts.pnl; }
  buildPnlChart(getFiltered().sort((a,b)=>a.dateStr.localeCompare(b.dateStr)));
});

// ROI tabs
document.getElementById('roiTabs').addEventListener('click',e=>{
  const btn=e.target.closest('.tab'); if(!btn) return;
  document.querySelectorAll('#roiTabs .tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  roiMode=btn.dataset.roi;
  if(charts.roi){ try{charts.roi.destroy();}catch(e){} delete charts.roi; }
  buildRoiChart(getFiltered());
});

// Bonus panel toggle
document.getElementById('bonusPanelHead').addEventListener('click',()=>{
  const body=document.getElementById('bonusBody');
  const icon=document.getElementById('bonusToggleIcon');
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  icon.classList.toggle('open',!isOpen);
});

// Bonus add
document.getElementById('bonusAddBtn').addEventListener('click',async()=>{
  const type=document.getElementById('bonusType').value;
  const date=document.getElementById('bonusDate').value;
  const amount=parseFloat(document.getElementById('bonusAmount').value);
  const note=document.getElementById('bonusNote').value.trim();

  if(!date){ showToast('вҡ  РЈРәР°Р¶РёСӮРө РҙР°СӮСғ','red'); return; }
  if(!amount||amount<=0){ showToast('вҡ  РЈРәР°Р¶РёСӮРө РәРҫСҖСҖРөРәСӮРҪСғСҺ СҒСғРјРјСғ','red'); return; }

  const record={type,date,amount:Math.round(amount*100)/100,note};
  const newId=await bonusAdd(record);
  record.id=newId;
  allBonuses.push(record);

  // Reset amount and note
  document.getElementById('bonusAmount').value='';
  document.getElementById('bonusNote').value='';

  renderBonusTable();
  renderBonusSummary();
  refreshAll();
  showToast(`вң… Р‘РҫРҪСғСҒ +$${record.amount.toFixed(2)} РҙРҫРұР°РІР»РөРҪ`,'green');

  // Ensure panel stays open
  document.getElementById('bonusBody').classList.add('open');
  document.getElementById('bonusToggleIcon').classList.add('open');
});

// Main nav
document.querySelectorAll('.main-tab').forEach(t=>{
  t.addEventListener('click',()=>switchPage(t.dataset.page));
});

// HH drop zone
const hhDrop=document.getElementById('hhDrop');
const hhZipInput=document.getElementById('hhZipInput');
hhDrop.addEventListener('click',()=>hhZipInput.click());
hhZipInput.addEventListener('change',e=>{ if(e.target.files[0]){processHhZip(e.target.files[0]); e.target.value='';} });
hhDrop.addEventListener('dragover',e=>{ e.preventDefault(); hhDrop.classList.add('over'); });
hhDrop.addEventListener('dragleave',()=>hhDrop.classList.remove('over'));
hhDrop.addEventListener('drop',e=>{ e.preventDefault(); hhDrop.classList.remove('over'); if(e.dataTransfer.files[0]) processHhZip(e.dataTransfer.files[0]); });

// Position tabs
document.getElementById('posTabs').addEventListener('click',e=>{
  const btn=e.target.closest('.pos-tab'); if(!btn) return;
  document.querySelectorAll('.pos-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  currentPos=btn.dataset.pos;
  buildHandMatrix(allHands);
  buildTopHands(allHands);
});

// Top hands tabs
document.getElementById('topHandsTabs').addEventListener('click',e=>{
  const btn=e.target.closest('.tab'); if(!btn) return;
  document.querySelectorAll('#topHandsTabs .tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  topMode=btn.dataset.top;
  buildTopHands(allHands);
});

init();
</script>
